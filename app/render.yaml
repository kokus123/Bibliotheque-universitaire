services:
  - type: web
    name: bibliotheque-universitaire-miguel
    env: php
    plan: free
    region: frankfurt # Plus proche de toi pour la vitesse
    buildCommand: |
      composer install --no-dev
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    startCommand: php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: database/database.sqlite
      - key: APP_KEY
        sync: false # Tu devras la copier de ton .env vers l'interface Render